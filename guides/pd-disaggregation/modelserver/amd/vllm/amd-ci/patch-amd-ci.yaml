      containers:
        - name: modelserver
          imagePullPolicy: Always
          resources:
            limits:
              amd.com/gpu: "8"
              amd.com/vnic: "8"
            requests:
              amd.com/gpu: "8"
              amd.com/vnic: "8"
          env:
            - { name: UCX_TLS,                        value: "tcp,self,rocm,shm" }
