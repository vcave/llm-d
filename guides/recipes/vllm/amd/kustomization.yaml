apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../base

images:
  - name: INFERENCE_SERVER_IMAGE
    newName: vllm/vllm-openai-rocm
    newTag: v0.17.1

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: llm-d-model-server
      spec:
        template:
          metadata:
            labels:
              llm-d.ai/hardware-variant: "gpu"
              llm-d.ai/accelerator-vendor: "amd"
